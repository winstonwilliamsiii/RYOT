#configuration settings

environment: dev

api:
  host: "0.0.0.0"
  port: 8000
  debug: true

database:
  type: "mysql"
  host: "${MYSQLHOST}"       # Railway env variable
  port: ${MYSQLPORT}
  user: "${MYSQLUSER}"
  password: "${MYSQLPASSWORD}"
  name: "${MYSQLDATABASE}"

notifications:
  email_enabled: true
  sms_enabled: true

external_apis:
  congress: "https://api.congress.gov"
  openstates: "https://openstates.org/api/v1"
